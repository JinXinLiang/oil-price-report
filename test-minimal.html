<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最小测试</title>
<script src="js/echarts.min.js"></script>
<style>body{padding:16px;background:#f5f6fa;font-family:sans-serif}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.chart{width:100%;height:160px}</style>
</head><body>
<h2>最小测试 - 3个图表</h2>

<div class="card">
<div style="font-size:15px;font-weight:600">垦利 0#柴油</div>
<div id="c0" class="chart"></div>
</div>

<div class="card">
<div style="font-size:15px;font-weight:600">中石化 0#柴油</div>
<div id="c1" class="chart"></div>
</div>

<div class="card">
<div style="font-size:15px;font-weight:600">金诚 95#汽油</div>
<div id="c2" class="chart"></div>
</div>

<div id="log" style="background:#fff;padding:16px;border-radius:12px;margin-top:14px">
<h3>日志</h3>
<pre id="log-content"></pre>
</div>

<script>
var logs = [];
function log(msg) { logs.push(msg); document.getElementById('log-content').textContent = logs.join('\n'); }

log('echarts version: ' + (echarts ? echarts.version : 'NOT LOADED'));

try {
  var el0 = document.getElementById('c0');
  log('c0 element: ' + (el0 ? el0.offsetWidth + 'x' + el0.offsetHeight : 'NOT FOUND'));
  var c0 = echarts.init(el0);
  c0.setOption({tooltip:{trigger:'axis'},xAxis:{type:'category',data:['04-01','04-02','04-03']},yAxis:{type:'value'},series:[{type:'line',data:[7300,7200,7400]}]});
  log('c0 OK');
} catch(e) { log('c0 ERROR: ' + e.message); }

try {
  var el1 = document.getElementById('c1');
  log('c1 element: ' + (el1 ? el1.offsetWidth + 'x' + el1.offsetHeight : 'NOT FOUND'));
  var c1 = echarts.init(el1);
  c1.setOption({tooltip:{trigger:'axis'},xAxis:{type:'category',data:['04-01','04-02','04-03']},yAxis:{type:'value'},series:[{type:'line',data:[9100,9000,8900]}]});
  log('c1 OK');
} catch(e) { log('c1 ERROR: ' + e.message); }

try {
  var el2 = document.getElementById('c2');
  log('c2 element: ' + (el2 ? el2.offsetWidth + 'x' + el2.offsetHeight : 'NOT FOUND'));
  var c2 = echarts.init(el2);
  c2.setOption({tooltip:{trigger:'axis'},xAxis:{type:'category',data:['04-01','04-02','04-03']},yAxis:{type:'value'},series:[{type:'line',data:[7600,7500,7510]}]});
  log('c2 OK');
} catch(e) { log('c2 ERROR: ' + e.message); }

log('DONE - all charts initialized');
</script></body></html>
